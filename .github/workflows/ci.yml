name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Audit production dependencies
        run: yarn audit --groups dependencies --level high
        continue-on-error: true

      - name: Build
        run: yarn build

      - name: Landing route bundle size (soft/warn — never fails)
        # Best-effort estimate of the "/" route's client JS payload from the
        # `next build` output above (see script header for why this can't be
        # a hard gate: Next 16 Turbopack no longer prints per-route sizes).
        # The script itself always exits 0; continue-on-error is a second,
        # cheap layer of safety so a future change to the script can never
        # accidentally turn this into a blocking step.
        run: node scripts/check-app-route-size.mjs
        continue-on-error: true

  bundle-budget:
    name: Engine bundle-size budget
    runs-on: ubuntu-latest
    # Independent of the `checks` job — only needs the headless engine
    # built, not the app's lint/test/next-build — so it runs in parallel and
    # stays fast (ADR-0003 Phase 3: protect the tree-shaking win).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # Full root install is intentional, not something to "optimize" into a
      # partial/filtered install: form-builder/ has its own package.json (for
      # a real `exports` map) but is NOT a yarn workspace member — it has no
      # node_modules of its own. `cd form-builder && yarn build` below
      # resolves `tsup` by walking up to the root node_modules/.bin, the same
      # way Yarn classic resolves any script run from a subdirectory. A
      # scoped/partial install here would leave that resolution with nothing
      # to find.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build engine (tsup)
        run: cd form-builder && yarn build

      - name: Check engine dist gzip budget + rendering-layer coupling
        run: node scripts/check-bundle-size.mjs
