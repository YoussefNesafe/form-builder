name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Audit production dependencies
        # Hard gate: a high/critical advisory in a PRODUCTION dependency fails
        # CI. This package vendors its source into consumers' repos (copy-in
        # distribution), so a vulnerable transitive dep ships straight to them
        # — an advisory-only warning is not enough protection. Scoped to
        # `--groups dependencies` so a devDependency advisory never blocks a
        # merge. Caveat: yarn classic `audit` has no per-advisory allowlist
        # (unlike berry's `yarn npm audit --exclude`); if an UNFIXABLE prod
        # advisory ever wedges CI, the escape hatch is to bump/replace the dep,
        # or temporarily restore `continue-on-error: true` on this step with a
        # tracking issue — do not silence it permanently.
        run: yarn audit --groups dependencies --level high

      - name: Build
        run: yarn build

      - name: Landing route bundle size (soft/warn — never fails)
        # Best-effort estimate of the "/" route's client JS payload from the
        # `next build` output above (see script header for why this can't be
        # a hard gate: Next 16 Turbopack no longer prints per-route sizes).
        # The script itself always exits 0; continue-on-error is a second,
        # cheap layer of safety so a future change to the script can never
        # accidentally turn this into a blocking step.
        run: node scripts/check-app-route-size.mjs
        continue-on-error: true

  bundle-budget:
    name: Engine bundle-size budget
    runs-on: ubuntu-latest
    # Independent of the `checks` job — only needs the headless engine
    # built, not the app's lint/test/next-build — so it runs in parallel and
    # stays fast (ADR-0003 Phase 3: protect the tree-shaking win).
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn

      # Full root install is intentional, not something to "optimize" into a
      # partial/filtered install: form-builder/ has its own package.json (for
      # a real `exports` map) but is NOT a yarn workspace member — it has no
      # node_modules of its own, so `tsup` lives ONLY in the root
      # node_modules/.bin. The build step below invokes it by explicit
      # relative path from within form-builder/ (Yarn classic does NOT put an
      # ancestor's .bin on PATH when a script is run from a subdir that has
      # its own package.json — so `yarn build` there would fail with 127). A
      # scoped/partial install here would leave that binary unresolvable.
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build engine (tsup)
        run: cd form-builder && ../node_modules/.bin/tsup --config tsup.config.ts

      - name: Check engine dist gzip budget + rendering-layer coupling
        run: node scripts/check-bundle-size.mjs
