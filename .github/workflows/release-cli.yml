# Releases the CLI INSTALLER ONLY (Unit B, ADR-0003) — `cli/`, published to
# npm as `form-builder-nextjs`. The CLI carries the engine + rendered UI layer
# as vendored source inside its own tarball (`cli/vendor/`, produced by
# `cli/scripts/vendor.mjs` at prepublishOnly time), so this publish ships the
# engine to consumers without the engine being a separate npm package.
#
# This is a SEPARATE publish from `release.yml` (Unit A, the headless engine).
# Per docs/plans/2026-07-18-packaging-publish-runbook.md §6c the two are
# independent: neither blocks nor triggers the other.
#
# ============================================================================
# ACTIVATION CHECKLIST — until both are true, runs won't publish:
#
#   1. Link this repo as an npm Trusted Publisher for `form-builder-nextjs`
#      (npmjs.com → package → Settings → Trusted Publisher → GitHub Actions):
#      organization/user `YoussefNesafe`, repository `form-builder`, workflow
#      filename `release-cli.yml` (filename only, case-sensitive), environment
#      `release`, allowed action `npm publish`. No npm token/secret is created
#      or stored — publish auth is a short-lived OIDC token npm exchanges
#      automatically at publish time using the `id-token: write` permission
#      below. Requires npm CLI >= 11.5.1 and Node >= 22.14.0, guaranteed by
#      the "Ensure npm supports Trusted Publishing" step below regardless of
#      what setup-node's pinned Node 22 line ships by default.
#      (Linked 2026-07-20 — see docs/plans/2026-07-18-packaging-publish-runbook.md
#      Addendum for the full migration history.)
#   2. Create a `release` GitHub Environment (Settings → Environments) with
#      at least one required reviewer. The job below declares
#      `environment: release`, so GitHub pauses and waits for approval before
#      any step runs — the human gate on an irreversible publish. Without
#      required reviewers the job runs unattended. (The `environment` name
#      MUST match what was entered in the Trusted Publisher link above.)
#   3. Push a tag matching `cli-v*` whose version equals cli/package.json's
#      "version" (e.g. `git tag cli-v0.1.5 && git push origin cli-v0.1.5`).
#      A mismatch fails the run before reaching the registry.
#
# `workflow_dispatch` defaults to --dry-run, so a manual run can never
# publish by accident; it must be explicitly unchecked. Verify the OIDC link
# with a `workflow_dispatch` --dry-run run before the first real token-free
# publish (a misconfigured Trusted Publisher link must not block a release).
# ============================================================================

name: Release CLI

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Publish with npm's --dry-run (nothing is uploaded/registered)"
        type: boolean
        default: true

# Never race two publishes of the same ref. Deliberately NOT
# cancel-in-progress: a half-finished `npm publish` should complete or fail on
# its own rather than be killed mid-upload.
concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish form-builder-nextjs
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read # only needs to read the repo
      id-token: write # OIDC token: npm Trusted Publishing auth AND provenance attestation
    steps:
      # Pinned to full commit SHAs (not moving `@v4` tags): this publish job
      # runs with `id-token: write` and can mint a short-lived npm publish
      # credential via OIDC, so a compromised mutable tag would run with
      # registry-write capability. CI (ci.yml) has no such permission.
      # Dependabot updates these pins.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: yarn
          # Sets the registry and writes a scoped ~/.npmrc. Auth itself is OIDC
          # Trusted Publishing (see the Publish step) — no token is written into
          # the repo or this YAML. (See the NOTE below if the empty _authToken
          # this input writes ever shadows the OIDC exchange.)
          registry-url: "https://registry.npmjs.org"
        env:
          # setup-node v7 writes the ~/.npmrc auth line
          # (//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}) BEFORE the
          # `cache: yarn` step shells out to `yarn cache dir`. yarn-classic then
          # env-expands that .npmrc and hard-fails ("Failed to replace env in
          # config: ${NODE_AUTH_TOKEN}") when the var is undefined. Trusted
          # Publishing removes the NPM_TOKEN secret entirely, so this is now
          # hardcoded to an empty string purely to keep the cache step's
          # env-expand from failing — the Publish step authenticates via OIDC,
          # not this var. Regression introduced by the actions/setup-node 4->7
          # bump; setup-node v4 ordered its steps so this never triggered.
          # NOTE: if the first token-free publish 401s (npm sending the empty
          # _authToken instead of falling back to OIDC), remove the
          # `registry-url:` input above so no _authToken line is written at all
          # — OIDC Trusted Publishing does not need registry-url.
          NODE_AUTH_TOKEN: ""

      - name: Ensure npm supports Trusted Publishing
        # Trusted Publishing (OIDC token exchange) requires npm CLI >= 11.5.1,
        # newer than the version bundled with Node 22 above. Upgrade in place so
        # the OIDC exchange is available when the Publish step runs.
        run: npm install -g npm@latest

      - name: Install dependencies
        # cli/ declares no dependencies of its own, but its prepublishOnly
        # scripts import from the repo root (`scripts/collectFiles.mjs`,
        # `scripts/build-registry.mjs`), so the root install must run first.
        run: yarn install --frozen-lockfile

      - name: "Guard: tag version matches cli/package.json"
        # Only meaningful on a tag push; workflow_dispatch has no version to
        # compare against and is skipped.
        if: startsWith(github.ref, 'refs/tags/cli-v')
        working-directory: cli
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag: $TAG_VERSION / package.json: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match cli/package.json version $PKG_VERSION. Bump the version and retag."
            exit 1
          fi

      - name: Determine publish mode (real vs --dry-run)
        id: publish_mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dryRun }}" = "true" ]; then
            echo "args=--dry-run" >> "$GITHUB_OUTPUT"
            echo "Publish mode: --dry-run (workflow_dispatch, dryRun=true)"
          elif [ "${{ github.event.repository.private }}" = "true" ]; then
            # npm rejects a provenance bundle from a PRIVATE repo with E422
            # ("Only public source repositories are supported when publishing
            # with provenance"), so the flag must be omitted here. This is
            # keyed off repo visibility rather than hardcoded, so provenance
            # switches itself on automatically if the repo is ever made public.
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "Publish mode: real publish (no --provenance — repo is private)"
          else
            # --provenance attaches a signed attestation linking the published
            # tarball to this workflow run/commit, using the id-token: write
            # OIDC permission above. Omitted on --dry-run, which never reaches
            # the registry and so has nothing to attest to.
            echo "args=--provenance" >> "$GITHUB_OUTPUT"
            echo "Publish mode: real publish (with --provenance)"
          fi

      - name: Publish to npm
        # `npm publish` runs cli/'s prepublishOnly, which re-vendors the engine
        # source and runs the self-sufficiency gate — no separate vendor step.
        # Auth is OIDC Trusted Publishing: npm's CLI detects the GitHub Actions
        # environment and exchanges the `id-token: write` OIDC token for a
        # short-lived publish credential automatically — no NODE_AUTH_TOKEN, no
        # stored secret. If the repo isn't linked as a Trusted Publisher for
        # form-builder-nextjs on npmjs.com, this fails loudly (401/403) rather
        # than skipping — verify with a dry-run workflow_dispatch first (see
        # ACTIVATION CHECKLIST above).
        working-directory: cli
        run: npm publish --access public ${{ steps.publish_mode.outputs.args }}
